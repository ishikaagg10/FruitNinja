<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Soft-Body Fruit Ninja</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #3a2210; touch-action: none; user-select: none; -webkit-user-select: none; }
      canvas { display: block; }

      #ui {
        position: fixed; top: 0; left: 0; width: 100%; padding: 16px 24px;
        display: flex; justify-content: space-between; align-items: center;
        pointer-events: none; z-index: 10;
        font-family: 'Segoe UI', sans-serif;
      }
      #score {
        color: #fff; font-size: 32px; font-weight: 700;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      }
      #timer {
        color: #fff; font-size: 26px; font-weight: 600;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        transition: color 0.3s;
      }

      #start-screen, #game-over {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 20;
        background: radial-gradient(ellipse at center, rgba(40,25,10,0.88), rgba(20,12,5,0.97));
        cursor: pointer;
      }
      #start-screen h1 {
        font-family: 'Segoe UI', sans-serif; font-size: 52px; font-weight: 900;
        color: #fff; letter-spacing: -1px;
        text-shadow: 0 0 40px rgba(255,120,50,0.4), 0 4px 12px rgba(0,0,0,0.5);
      }
      #start-screen p, #game-over p {
        color: rgba(255,255,255,0.5); font-size: 16px; margin-top: 16px;
        font-family: 'Segoe UI', sans-serif;
      }
      #game-over h2 {
        font-family: 'Segoe UI', sans-serif; font-size: 40px; font-weight: 800;
        color: #ff3c3c; text-shadow: 0 0 30px rgba(255,60,60,0.3);
      }
      #game-over .final-score {
        font-size: 72px; font-weight: 900; color: #fff; margin: 12px 0;
        font-family: 'Segoe UI', sans-serif;
        text-shadow: 0 0 40px rgba(255,200,50,0.3);
      }

      .hidden { display: none !important; }
      #blade-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <h1>FRUIT NINJA</h1>
      <p>Tap or click to start — swipe to slice!</p>
    </div>

    <div id="game-over" class="hidden">
      <h2>GAME OVER</h2>
      <div id="game-over-reason" style="color: rgba(255,255,255,0.5); font-size: 16px; margin-bottom: 8px; font-family: 'Segoe UI', sans-serif;"></div>
      <div class="final-score" id="final-score">0</div>
      <p>Tap to play again</p>
    </div>

    <div id="ui" class="hidden">
      <div id="score">0</div>
      <div id="timer">1:00</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <canvas id="blade-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
